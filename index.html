<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q2: Time-Lagged Impact of Education on Wealth</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
    <h1>Global Education Investment vs. Wealth Accumulation (1999-2023)</h1>
    <p><strong>Step 1:</strong> Explore the map and click a country. <strong>Step 2:</strong> Analyze the investment time lag.</p >
</div>

<div class="dashboard">
    <div class="card map-card" id="map-view">
        <div class="card-header">
            <h2>Average Education Expenditure (% of GDP)</h2>
        </div>
        <div id="map"></div>
    </div>

    <div class="card chart-card" id="chart-view" style="display: none;">
        <div class="card-header">
            <button id="btn-back" class="back-btn">← Back to Global Map</button>
            <h2 id="chart-title">Trend Analysis</h2>
        </div>

        <div class="controls">
            <div class="slider-group">
                <label for="lag-slider">
                    Shift Expenditure: <span id="lag-value">0</span> Years
                </label>
                <input type="range" id="lag-slider" min="0" max="10" step="1" value="0" disabled>
            </div>
        </div>

        <div class="chart-legend">
            <div class="legend-item">
                <span class="dot dot-iwi"></span> IWI Score (Wealth)
            </div>
            <div class="legend-item">
                <span class="dot dot-exp"></span> Education Expenditure (% of GDP)
            </div>
        </div>

        <div id="line-chart"></div>
    </div>
</div>

<div id="tooltip" class="hidden"></div>

<script src="script.js"></script>
</body>
</html>
